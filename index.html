<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeXBaku | Luxury Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkY51jHCvchXjlk0N005SaRcneCv_fWX0",
            authDomain: "timexbaku-a2c66.firebaseapp.com",
            projectId: "timexbaku-a2c66",
            storageBucket: "timexbaku-a2c66.firebasestorage.app",
            messagingSenderId: "837389958136",
            appId: "1:837389958136:web:6de36b6d6049783051f40d",
            measurementId: "G-52Q733P2FJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('mainGrid');
        const adminList = document.getElementById('adminProductList');
        const q = query(collection(db, "watches"), orderBy("createdAt", "desc"));

        // CANLI YENİLƏNMƏ (Həm vitrin, həm admin siyahısı üçün)
        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            adminList.innerHTML = "";
            
            snapshot.forEach((d) => {
                const item = d.data();
                const id = d.id;

                // Müştəri üçün Vitrin
                grid.innerHTML += `
                    <div class="bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 hover:border-[#d4af37] transition-all duration-700 group">
                        <div class="overflow-hidden">
                            <img src="${item.img}" class="w-full h-[400px] object-cover group-hover:scale-105 transition duration-700">
                        </div>
                        <div class="p-8 bg-black/40 backdrop-blur-md">
                            <h3 class="luxury-font text-2xl mb-2 text-white">${item.name}</h3>
                            <p class="text-[#d4af37] font-bold text-xl mb-3">${item.price} AZN</p>
                            <p class="text-zinc-400 text-sm mb-6 leading-relaxed h-12 overflow-hidden">${item.desc || ''}</p>
                            <a href="https://wa.me/9943220807?text=Salam, ${item.name} saatı üçün yazıram." target="_blank"
                               class="block text-center py-4 border border-[#d4af37] text-[#d4af37] rounded-full font-bold hover:bg-[#d4af37] hover:text-black transition uppercase tracking-widest text-xs">
                                SİFARİŞ ET
                            </a>
                        </div>
                    </div>`;

                // Admin üçün Silmə Siyahısı
                adminList.innerHTML += `
                    <div class="flex items-center justify-between bg-black p-3 rounded-lg border border-zinc-800">
                        <div class="flex items-center gap-3">
                            <img src="${item.img}" class="w-10 h-10 object-cover rounded">
                            <span class="text-xs text-zinc-300 truncate w-32">${item.name}</span>
                        </div>
                        <button onclick="deleteProduct('${id}')" class="bg-red-900/50 text-red-500 px-3 py-1 rounded text-[10px] hover:bg-red-600 hover:text-white transition">SİL</button>
                    </div>`;
            });
        });

        // SİLMƏ FUNKSİYASI (Yalnız Admin Paneldən çağırılır)
        window.deleteProduct = async function(id) {
            if(confirm("Bu elanı silməyə əminsən?")) {
                try {
                    await deleteDoc(doc(db, "watches", id));
                } catch (err) { alert("Xəta: " + err.message); }
            }
        }

        window.uploadToDatabase = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const file = document.getElementById('pFile').files[0];

            if(!name || !price || !file) return alert("Məlumatları doldurun!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    await addDoc(collection(db, "watches"), {
                        name, price, desc, img: e.target.result, createdAt: new Date()
                    });
                    alert("Uğurla əlavə edildi!");
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    document.getElementById('pDesc').value = "";
                } catch (err) { alert("Xəta: " + err.message); }
            };
            reader.readAsDataURL(file);
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .luxury-font { font-family: 'Cinzel', serif; }
        #secretPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 20px; padding: 20px; }
        .admin-box { max-height: 90vh; overflow-y: auto; width: 100%; max-width: 500px; }
        footer { margin-top: auto; padding: 40px; text-align: center; color: #0a0a0a; font-size: 10px; cursor: pointer; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="py-10 text-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <h1 class="text-3xl tracking-[0.4em] font-bold luxury-font uppercase">
            TIME<span class="text-[#d4af37]">X</span><span class="text-orange-600">BAKU</span>
        </h1>
    </nav>

    <main class="container mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 flex-grow" id="mainGrid"></main>

    <footer id="hiddenClickZone">© Secure System Entry</footer>

    <div id="secretPanel">
        <div class="admin-box bg-zinc-900 p-8 rounded-[2.5rem] border border-[#d4af37]/20 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-lg text-[#d4af37] font-bold luxury-font uppercase tracking-widest">İdarəetmə</h2>
                <button onclick="document.getElementById('secretPanel').style.display='none'" class="text-zinc-500 hover:text-white">✕</button>
            </div>
            
            <div class="space-y-4 mb-10 pb-10 border-b border-zinc-800">
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2">Yeni Elan</p>
                <input type="text" id="pName" placeholder="Brend və Model" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37] text-sm">
                <input type="number" id="pPrice" placeholder="Qiymət (Rəqəmlə)" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37] text-sm">
                <textarea id="pDesc" placeholder="Açıqlama (Kampaniya, Çatdırılma və s.)" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37] h-24 resize-none text-sm"></textarea>
                <input type="file" id="pFile" accept="image/*" class="w-full text-[10px] text-zinc-400">
                <button onclick="uploadToDatabase()" class="w-full py-4 bg-[#d4af37] text-black font-black rounded-xl uppercase text-xs tracking-widest hover:bg-orange-500 transition">Sayta Yerləşdir</button>
            </div>

            <div>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-4">Mövcud Elanları Sil</p>
                <div id="adminProductList" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let lastClickTime = 0;
        document.getElementById('hiddenClickZone').addEventListener('click', () => {
            const currentTime = new Date().getTime();
            if (currentTime - lastClickTime < 500) { clickCount++; } else { clickCount = 1; }
            lastClickTime = currentTime;
            if (clickCount === 3) {
                if(prompt("Admin şifrəsi:") === "qaqa0202qaqa0202") {
                    document.getElementById('secretPanel').style.display = 'flex';
                }
                clickCount = 0;
            }
        });
    </script>
</body>
</html>
