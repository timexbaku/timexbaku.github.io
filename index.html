<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeXBaku | Luxury Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkY51jHCvchXjlk0N005SaRcneCv_fWX0",
            authDomain: "timexbaku-a2c66.firebaseapp.com",
            projectId: "timexbaku-a2c66",
            storageBucket: "timexbaku-a2c66.firebasestorage.app",
            messagingSenderId: "837389958136",
            appId: "1:837389958136:web:6de36b6d6049783051f40d",
            measurementId: "G-52Q733P2FJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('mainGrid');
        const q = query(collection(db, "watches"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            if (snapshot.empty) {
                grid.innerHTML = "<p class='col-span-full text-center text-zinc-600 py-20 italic'>Kolleksiya boşdur...</p>";
            }
            snapshot.forEach((doc) => {
                const item = doc.data();
                grid.innerHTML += `
                    <div class="bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 hover:border-[#d4af37] transition-all duration-700 group">
                        <div class="overflow-hidden">
                            <img src="${item.img}" class="w-full h-[450px] object-cover group-hover:scale-105 transition duration-700">
                        </div>
                        <div class="p-10 bg-black/40 backdrop-blur-md">
                            <h3 style="font-family: 'Cinzel';" class="text-2xl mb-2 text-white">${item.name}</h3>
                            <p class="text-orange-500 font-bold text-xl mb-8 tracking-wider">${item.price}</p>
                            <a href="https://wa.me/9943220807?text=Salam, ${item.name} saatı üçün yazıram." target="_blank"
                               class="block text-center py-5 border border-[#d4af37] text-[#d4af37] rounded-full font-bold hover:bg-[#d4af37] hover:text-black transition uppercase tracking-widest text-sm">
                                SİFARİŞ ET
                            </a>
                        </div>
                    </div>`;
            });
        });

        window.uploadToDatabase = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const file = document.getElementById('pFile').files[0];

            if(!name || !price || !file) return alert("Məlumatları tam doldurun!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Img = e.target.result;
                try {
                    await addDoc(collection(db, "watches"), {
                        name: name,
                        price: price,
                        img: base64Img,
                        createdAt: new Date()
                    });
                    alert("Model uğurla əlavə edildi!");
                    document.getElementById('secretPanel').style.display = 'none';
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    document.getElementById('pFile').value = "";
                } catch (err) { alert("Xəta baş verdi: " + err.message); }
            };
            reader.readAsDataURL(file);
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .luxury-font { font-family: 'Cinzel', serif; }
        #secretPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 15px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }
    </style>
</head>
<body>

    <nav class="py-12 text-center border-b border-zinc-900 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <h1 class="text-4xl tracking-[0.5em] font-bold luxury-font uppercase">
            TIME<span class="text-[#d4af37]">X</span><span class="text-orange-600">BAKU</span>
        </h1>
    </nav>

    <main class="container mx-auto px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 py-16" id="mainGrid">
        <p class="col-span-full text-center text-zinc-600">Kolleksiya yüklənir...</p>
    </main>

    <div id="secretPanel">
        <div class="bg-zinc-900 p-12 rounded-[3rem] border border-[#d4af37]/30 w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl mb-8 text-[#d4af37] font-bold text-center luxury-font uppercase tracking-widest">Model Əlavə Et</h2>
            <div class="space-y-6">
                <input type="text" id="pName" placeholder="Brend və Model" class="w-full p-5 bg-black rounded-2xl border border-zinc-800 outline-none text-white focus:border-[#d4af37] transition-all">
                <input type="text" id="pPrice" placeholder="Qiymət (məs: 450 AZN)" class="w-full p-5 bg-black rounded-2xl border border-zinc-800 outline-none text-white focus:border-[#d4af37] transition-all">
                <div class="bg-black/50 p-4 rounded-2xl border border-dashed border-zinc-700">
                    <input type="file" id="pFile" accept="image/*" class="w-full text-zinc-400 text-sm">
                </div>
                <button onclick="uploadToDatabase()" class="w-full py-5 bg-[#d4af37] text-black font-black rounded-2xl uppercase tracking-widest hover:bg-[#b8860b] transition shadow-lg active:scale-95">Sayta Yerləşdir</button>
                <button onclick="document.getElementById('secretPanel').style.display='none'" class="w-full mt-4 text-zinc-600 text-xs uppercase tracking-[0.2em] hover:text-white transition">Bağla</button>
            </div>
        </div>
    </div>

    <script>
        // SHIFT + TAB kombinasiyası üçün
        document.addEventListener('keydown', (event) => {
            // event.shiftKey - Shift basılıbmı yoxlayır
            // event.key === 'Tab' - Tab basılıbmı yoxlayır
            if (event.shiftKey && event.key === 'Tab') {
                event.preventDefault(); // Brauzerin standart Tab funksiyasını dayandırır
                let pass = prompt("Təhlükəsizlik Kodu:");
                if(pass === "qaqa0202qaqa0202") {
                    document.getElementById('secretPanel').style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
