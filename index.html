<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeXBaku | Luxury Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkY51jHCvchXjlk0N005SaRcneCv_fWX0",
            authDomain: "timexbaku-a2c66.firebaseapp.com",
            projectId: "timexbaku-a2c66",
            storageBucket: "timexbaku-a2c66.firebasestorage.app",
            messagingSenderId: "837389958136",
            appId: "1:837389958136:web:6de36b6d6049783051f40d",
            measurementId: "G-52Q733P2FJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('mainGrid');
        const q = query(collection(db, "watches"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            if (snapshot.empty) {
                grid.innerHTML = "<p class='col-span-full text-center text-zinc-600 py-32 italic'>Kolleksiya tezliklə əlavə olunacaq...</p>";
            }
            snapshot.forEach((doc) => {
                const item = doc.data();
                grid.innerHTML += `
                    <div class="bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 hover:border-[#d4af37] transition-all duration-700">
                        <img src="${item.img}" class="w-full h-[450px] object-cover hover:scale-105 transition duration-700">
                        <div class="p-10">
                            <h3 style="font-family: 'Cinzel';" class="text-2xl mb-2 text-white">${item.name}</h3>
                            <p class="text-orange-500 font-bold text-xl mb-8 italic">${item.price}</p>
                            <a href="https://wa.me/9943220807?text=Salam, ${item.name} saatı ilə maraqlanıram." target="_blank"
                               class="block text-center py-5 border border-[#d4af37] text-[#d4af37] rounded-full font-bold hover:bg-[#d4af37] hover:text-black transition uppercase tracking-widest text-sm">
                                SİFARİŞ ET
                            </a>
                        </div>
                    </div>`;
            });
        });

        window.uploadToDatabase = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const file = document.getElementById('pFile').files[0];

            if(!name || !price || !file) return alert("Məlumatları tam doldurun!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Img = e.target.result;
                try {
                    await addDoc(collection(db, "watches"), {
                        name, price, img: base64Img, createdAt: new Date()
                    });
                    alert("Uğurla əlavə edildi!");
                    document.getElementById('secretPanel').style.display = 'none';
                } catch (err) { alert("Xəta: " + err.message); }
            };
            reader.readAsDataURL(file);
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .luxury-font { font-family: 'Cinzel', serif; }
        #secretPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 15px; }
        footer { margin-top: auto; padding: 40px; text-align: center; color: #222; font-size: 12px; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

    <nav class="py-12 text-center border-b border-zinc-900">
        <h1 class="text-4xl tracking-[0.5em] font-bold luxury-font uppercase">
            TIME<span class="text-[#d4af37]">X</span><span class="text-orange-600">BAKU</span>
        </h1>
    </nav>

    <main class="container mx-auto px-8 py-16 flex-grow" id="mainGrid"></main>

    <footer id="hiddenClickZone">
        © 2026 TimeXBaku - Premium Boutique
    </footer>

    <div id="secretPanel">
        <div class="bg-zinc-900 p-12 rounded-[3rem] border border-[#d4af37]/30 w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl mb-8 text-[#d4af37] font-bold text-center luxury-font uppercase">Model Əlavə Et</h2>
            <div class="space-y-6">
                <input type="text" id="pName" placeholder="Brend və Model" class="w-full p-5 bg-black rounded-2xl border border-zinc-800 outline-none text-white focus:border-[#d4af37]">
                <input type="text" id="pPrice" placeholder="Qiymət" class="w-full p-5 bg-black rounded-2xl border border-zinc-800 outline-none text-white focus:border-[#d4af37]">
                <input type="file" id="pFile" accept="image/*" class="w-full text-zinc-400">
                <button onclick="uploadToDatabase()" class="w-full py-5 bg-[#d4af37] text-black font-black rounded-2xl uppercase tracking-widest shadow-lg">Sayta Yerləşdir</button>
                <button onclick="document.getElementById('secretPanel').style.display='none'" class="w-full mt-4 text-zinc-600 text-xs">Bağla</button>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let lastClickTime = 0;

        document.getElementById('hiddenClickZone').addEventListener('click', () => {
            const currentTime = new Date().getTime();
            
            // Əgər iki klik arasındakı vaxt 500ms-dən azdırsa say
            if (currentTime - lastClickTime < 500) {
                clickCount++;
            } else {
                clickCount = 1;
            }
            
            lastClickTime = currentTime;

            if (clickCount === 3) {
                let pass = prompt("Kod:");
                if(pass === "qaqa0202qaqa0202") {
                    document.getElementById('secretPanel').style.display = 'flex';
                }
                clickCount = 0;
            }
        });
    </script>
</body>
</html>
