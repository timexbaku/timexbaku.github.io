<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeXBaku | Luxury Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkY51jHCvchXjlk0N005SaRcneCv_fWX0",
            authDomain: "timexbaku-a2c66.firebaseapp.com",
            projectId: "timexbaku-a2c66",
            storageBucket: "timexbaku-a2c66.firebasestorage.app",
            messagingSenderId: "837389958136",
            appId: "1:837389958136:web:6de36b6d6049783051f40d",
            measurementId: "G-52Q733P2FJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('mainGrid');
        const q = query(collection(db, "watches"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            snapshot.forEach((d) => {
                const item = d.data();
                const id = d.id;
                grid.innerHTML += `
                    <div class="bg-zinc-900 rounded-[2.5rem] overflow-hidden border border-zinc-800 hover:border-[#d4af37] transition-all duration-700 group relative">
                        <button onclick="adminDelete('${id}')" class="absolute top-5 right-5 z-30 bg-black/50 hover:bg-red-600 p-2 rounded-full text-white/30 hover:text-white transition-all duration-300 backdrop-blur-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>

                        <div class="overflow-hidden">
                            <img src="${item.img}" class="w-full h-[400px] object-cover group-hover:scale-105 transition duration-700">
                        </div>
                        <div class="p-8 bg-black/40 backdrop-blur-md">
                            <h3 class="luxury-font text-2xl mb-2 text-white">${item.name}</h3>
                            <p class="text-[#d4af37] font-bold text-xl mb-3">${item.price} AZN</p>
                            <p class="text-zinc-400 text-sm mb-6 leading-relaxed h-12 overflow-hidden">${item.desc || 'Premium model.'}</p>
                            <a href="https://wa.me/9943220807?text=Salam, ${item.name} üçün yazıram." target="_blank"
                               class="block text-center py-4 border border-[#d4af37] text-[#d4af37] rounded-full font-bold hover:bg-[#d4af37] hover:text-black transition uppercase tracking-widest text-xs">
                                SİFARİŞ ET
                            </a>
                        </div>
                    </div>`;
            });
        });

        // SİLMƏ FUNKSİYASI
        window.adminDelete = async function(id) {
            const pass = prompt("Bu elanı silmək üçün silinmə kodunu yazın:");
            if (pass === "sil0202") {
                if(confirm("Elan birdəfəlik silinsin?")) {
                    await deleteDoc(doc(db, "watches", id));
                    alert("Uğurla silindi.");
                }
            } else if (pass !== null) {
                alert("Bu funksiyanı yalnız Admin istifadə edə bilər!");
            }
        }

        window.uploadToDatabase = async function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const file = document.getElementById('pFile').files[0];

            if(!name || !price || !file) return alert("Ad, qiymət və şəkil mütləqdir!");

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    await addDoc(collection(db, "watches"), {
                        name, price, desc, img: e.target.result, createdAt: new Date()
                    });
                    alert("Uğurla əlavə edildi!");
                    document.getElementById('secretPanel').style.display = 'none';
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    document.getElementById('pDesc').value = "";
                } catch (err) { alert("Xəta: " + err.message); }
            };
            reader.readAsDataURL(file);
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .luxury-font { font-family: 'Cinzel', serif; }
        #secretPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 1000; align-items: center; justify-content: center; backdrop-blur: 20px; }
        footer { margin-top: auto; padding: 40px; text-align: center; color: #0a0a0a; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="py-10 text-center border-b border-zinc-900 sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <h1 class="text-3xl tracking-[0.4em] font-bold luxury-font uppercase">
            TIME<span class="text-[#d4af37]">X</span><span class="text-orange-600">BAKU</span>
        </h1>
    </nav>

    <main class="container mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 flex-grow" id="mainGrid"></main>

    <footer id="hiddenClickZone">© Admin Access Zone</footer>

    <div id="secretPanel">
        <div class="bg-zinc-900 p-10 rounded-[2.5rem] border border-[#d4af37]/20 w-full max-w-md shadow-2xl">
            <h2 class="text-lg text-[#d4af37] font-bold luxury-font uppercase mb-6 text-center">YENİ MODEL ƏLAVƏ ET</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="Brend və Model" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37]">
                <input type="number" id="pPrice" placeholder="Qiymət (AZN)" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37]">
                <textarea id="pDesc" placeholder="Açıqlama və Kampaniyalar" class="w-full p-4 bg-black rounded-xl border border-zinc-800 outline-none focus:border-[#d4af37] h-24 resize-none"></textarea>
                <input type="file" id="pFile" accept="image/*" class="w-full text-xs text-zinc-500">
                <button onclick="uploadToDatabase()" class="w-full py-4 bg-[#d4af37] text-black font-black rounded-xl uppercase tracking-widest">SİSTEMƏ YAZ</button>
                <button onclick="document.getElementById('secretPanel').style.display='none'" class="w-full text-zinc-600 text-[10px] mt-2">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let lastClickTime = 0;
        document.getElementById('hiddenClickZone').addEventListener('click', () => {
            const currentTime = new Date().getTime();
            if (currentTime - lastClickTime < 500) { clickCount++; } else { clickCount = 1; }
            lastClickTime = currentTime;
            if (clickCount === 3) {
                if(prompt("Giriş:") === "qaqa0202qaqa0202") document.getElementById('secretPanel').style.display = 'flex';
                clickCount = 0;
            }
        });
    </script>
</body>
</html>
